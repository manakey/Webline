<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebLine 登録</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="auth-card">

    <h1>💬 WebLine</h1>

    <p class="subtitle">
        新しいアカウントを作成
    </p>

    <input
        id="username"
        type="text"
        placeholder="ユーザー名">

    <input
        id="email"
        type="email"
        placeholder="メールアドレス">

    <input
        id="password"
        type="password"
        placeholder="パスワード">

    <button id="registerBtn">
        登録
    </button>

    <p id="message"></p>

    <p class="auth-link">
        すでにアカウントをお持ちですか？
        <a href="/">ログイン</a>
    </p>

</div>

<script src="js/register.js"></script>

</body>
</html>
