<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebLine</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="auth-card">

    <h1>💬 WebLine</h1>

    <p class="subtitle">
        友達や家族とつながろう
    </p>

    <input
        id="email"
        type="email"
        placeholder="メールアドレス">

    <input
        id="password"
        type="password"
        placeholder="パスワード">

    <button id="loginBtn">
        ログイン
    </button>

    <button id="guestBtn">
        ゲストとして利用
    </button>

    <button id="scratchBtn">
        Scratchでログイン（準備中）
    </button>

    <p class="auth-link">
        アカウントをお持ちでないですか？
        <a href="/register.html">新規登録</a>
    </p>

</div>

<script src="js/app.js"></script>

</body>
</html>
